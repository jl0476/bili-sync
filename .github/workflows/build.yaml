name: Build Binary

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Frontend
        run: bun run build
      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-build
          path: web/build

  build:
    name: Build bili-sync-rs for ${{ matrix.platform.release_for }}
    needs: build-frontend
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - release_for: Linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            bin: bili-sync-rs
            name: bili-sync-rs-Linux-x86_64-musl.tar.gz
            docker_platform: linux/amd64
          - release_for: Linux-aarch64
            os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            bin: bili-sync-rs
            name: bili-sync-rs-Linux-aarch64-musl.tar.gz
            docker_platform: linux/arm64
          - release_for: Linux-armv7
            os: ubuntu-24.04
            target: armv7-unknown-linux-musleabihf
            bin: bili-sync-rs
            name: bili-sync-rs-Linux-armv7-musl.tar.gz
            docker_platform: linux/arm/v7
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download Web Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: web/build
      - name: Read Toolchain Version
        id: read_rust_toolchain
        shell: bash
        run: |
          channel=$(grep '^channel' rust-toolchain.toml | sed 's/.*= *"\(.*\)"/\1/')
          echo "value=$channel" >> $GITHUB_OUTPUT
      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          toolchain: ${{ steps.read_rust_toolchain.outputs.value }}
          args: "--locked --release"
          strip: true
      - name: Package as archive
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar czvf ../../../${{ matrix.platform.name }} ${{ matrix.platform.bin }}
      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: bili-sync-rs-${{ matrix.platform.release_for }}
          path: |
            ${{ github.workspace }}/${{ matrix.platform.name }}

  docker:
    name: Build and push Docker image
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./targets
          pattern: bili-sync-rs-*
          merge-multiple: true

      - name: List downloaded files
        run: |
          find ./targets -type f | sort
          ls -la ./targets/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bili-sync-rs
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha
