name: Build Main Binary And Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write

jobs:
  build-binary:
    name: Build binaries
    uses: ./.github/workflows/build.yaml
    # build.yaml 内置了前端构建、二进制构建与 Docker 镜像推送（GHCR）
    permissions:
      contents: read
      packages: write

  github-release:
    name: Create GitHub Release
    needs: build-binary
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          pattern: bili-sync-rs-*
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/bili-sync-rs-*
          tag_name: ${{ github.ref_name }}
          draft: true
